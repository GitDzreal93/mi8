version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.3-alpine
    container_name: mi8-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: Postgres@2026
      POSTGRES_DB: mi8
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
